services:
  postgres:
    image: postgres:16-alpine
    container_name: altos-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: altos
      POSTGRES_USER: altos
      POSTGRES_PASSWORD: altos_dev_password
    ports:
      - "15432:5432"
    volumes:
      - altos_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U altos -d altos"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  altos_postgres_data:
